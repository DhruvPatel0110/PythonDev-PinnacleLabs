{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/products.css') }}">
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="card bg-dark text-light shadow-lg border-0 p-4">

        <h1 class="mb-4">Add Product</h1>

        <form method="POST" enctype="multipart/form-data" id="addProductForm">

            <!-- Product Name -->
            <div class="mb-4">
                <label class="form-label">Product Name</label>
                <input type="text"
                       class="form-control"
                       name="product_name"
                       placeholder="Example: Logitech G Pro X Wireless Gaming Headset"
                       required>
            </div>

            <!-- Product Category -->
            <div class="mb-4">
                <label class="form-label">Category</label>

                <select class="form-select" name="category" required>
                    <option value="">Select Category</option>
                    <option>Keyboard</option>
                    <option>Mouse</option>
                    <option>Headphones</option>
                    <option>Monitor</option>
                    <option>Laptop</option>
                    <option>Accessories</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- Product Image -->
            <div class="mb-4">
                <label class="form-label" for="product_image">Product Image</label>
                <input
                  type="file"
                  class="form-control"
                  id="product_image"
                  name="product_image"
                  accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
                >
                <small class="text-secondary">Optional. PNG, JPG, JPEG, GIF, or WEBP.</small>
                <div class="product-upload-preview mt-3" id="imagePreview" hidden>
                  <img id="imagePreviewImg" src="" alt="Product image preview">
                </div>
            </div>

            <!-- Product Specs -->
            <div class="mb-4">
                <label class="form-label">Product Specifications</label>

                <textarea class="form-control"
                          rows="6"
                          name="specifications"
                          placeholder="Include all technical specifications, size, color, connectivity, battery, RGB support, sound quality, etc."
                          required></textarea>
            </div>

            <!-- Price -->
            <div class="row">

                <div class="col-md-6 mb-4">
                    <label class="form-label">Price (₹)</label>

                    <input type="number"
                           class="form-control"
                           name="price"
                           required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Discount (%)</label>

                    <input type="number"
                           class="form-control"
                           name="discount"
                           placeholder="Optional">
                </div>

            </div>

            <!-- Return Policy -->
            <div class="mb-4">

                <label class="form-label">Return / Exchange Policy</label>

                <textarea class="form-control"
                          rows="3"
                          name="return_policy">Returns and exchanges are accepted within 7 days of delivery only if a valid unboxing video is provided as proof.</textarea>

            </div>

            <!-- Shipping Policy -->
            <div class="mb-4">

                <label class="form-label">Shipping Policy</label>

                <textarea class="form-control"
                          rows="3"
                          name="shipping_policy">Standard shipping usually takes 3-7 business days depending on the delivery location and pincode.</textarea>

            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100 py-2">
                Upload Product
            </button>

        </form>

    </div>

</div>

{% endblock %}

{% block extra_js %}
<script>
  (function () {
    const fileInput = document.getElementById('product_image');
    const previewWrap = document.getElementById('imagePreview');
    const previewImg = document.getElementById('imagePreviewImg');

    if (!fileInput || !previewWrap || !previewImg) {
      return;
    }

    fileInput.addEventListener('change', function () {
      const file = fileInput.files && fileInput.files[0];

      if (!file) {
        previewWrap.hidden = true;
        previewImg.removeAttribute('src');
        return;
      }

      previewImg.src = URL.createObjectURL(file);
      previewWrap.hidden = false;
    });
  })();
</script>
{% endblock %}
