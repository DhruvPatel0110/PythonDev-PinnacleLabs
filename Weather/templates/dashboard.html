<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>{{ app_name }} | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  </head>
  <body class="dashboard-page theme-cloudy">
    <div class="weather-animation-layer" aria-hidden="true">
      <div class="sun-glow"></div>
      <div class="cloud cloud-one"></div>
      <div class="cloud cloud-two"></div>
      <div class="rain-field">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="snow-field">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="lightning-flash"></div>
    </div>

    <main class="dashboard-shell">
      <header class="dashboard-header">
        <div>
          <p class="eyebrow">Weather Command Center</p>
          <h1 id="dashboardTitle">Dashboard</h1>
          <p class="dashboard-subtitle" id="dashboardSubtitle">Loading live weather intelligence.</p>
        </div>
        <form class="dashboard-search" id="dashboardSearchForm" autocomplete="off">
          <label class="visually-hidden" for="dashboardCityInput">Search city</label>
          <input class="form-control" id="dashboardCityInput" type="text" placeholder="Search another city">
          <button class="btn btn-dashboard" type="submit">Search</button>
        </form>
      </header>

      <div class="alert alert-danger dashboard-alert d-none" id="dashboardAlert" role="alert"></div>

      <section class="overview-strip" aria-label="Current weather overview">
        <div class="overview-main">
          <img class="overview-icon" id="overviewIcon" src="" alt="">
          <div>
            <span id="overviewCondition">Current condition</span>
            <strong><span id="overviewTemperature">--</span>°C</strong>
          </div>
        </div>
        <div class="overview-meta">
          <span id="overviewUpdated">Waiting for data</span>
        </div>
      </section>

      <section class="dashboard-grid" aria-label="Weather dashboard cards">
        <button class="dashboard-card" type="button" data-bs-toggle="modal" data-bs-target="#temperatureModal">
          <span class="card-label">Current Temperature</span>
          <strong class="card-value"><span id="cardTemperature">--</span>°C</strong>
          <span class="card-detail">Feels like <span id="cardFeelsLike">--</span>°C</span>
          <div class="mini-metrics">
            <span>Max <strong><span id="cardTempMax">--</span>°C</strong></span>
            <span>Min <strong><span id="cardTempMin">--</span>°C</strong></span>
          </div>
        </button>

        <button class="dashboard-card" type="button" data-bs-toggle="modal" data-bs-target="#conditionModal">
          <span class="card-label">Current Weather</span>
          <span class="condition-row">
            <img id="cardWeatherIcon" src="" alt="">
            <strong id="cardCondition">--</strong>
          </span>
          <span class="card-detail text-capitalize" id="cardDescription">Waiting for weather</span>
          <div class="mini-metrics">
            <span>Humidity <strong><span id="cardHumidity">--</span>%</strong></span>
            <span>Wind <strong><span id="cardWind">--</span> m/s</strong></span>
          </div>
        </button>

        <button class="dashboard-card" type="button" data-bs-toggle="modal" data-bs-target="#rainModal">
          <span class="card-label">Rain / Precipitation</span>
          <strong class="card-value"><span id="cardRainChance">--</span>%</strong>
          <span class="card-detail">Highest rain chance ahead</span>
          <div class="mini-metrics">
            <span>Precip <strong><span id="cardPrecipitation">--</span>%</strong></span>
            <span>Storm <strong><span id="cardStormChance">--</span>%</strong></span>
          </div>
        </button>

        <button class="dashboard-card" type="button" data-bs-toggle="modal" data-bs-target="#newsModal">
          <span class="card-label">Weather News</span>
          <strong class="card-value" id="cardNewsCount">--</strong>
          <span class="card-detail" id="cardNewsHeadline">Loading severe weather news</span>
          <div class="news-severity-pill" id="cardNewsSeverity">Severity pending</div>
        </button>
      </section>
    </main>

    <div class="modal fade" id="temperatureModal" tabindex="-1" aria-labelledby="temperatureModalTitle" aria-hidden="true">
      <div class="modal-dialog modal-xxl modal-dialog-centered temperature-modal-dialog">
        <div class="modal-content dashboard-modal temperature-modal-content">
          <div class="modal-header">
            <div>
              <h2 class="modal-title fs-4" id="temperatureModalTitle">Hourly Temperature Forecast</h2>
              <p class="modal-kicker">Temperature and feels-like trend for the next forecast window.</p>
            </div>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body temperature-modal-body">
            <div class="temperature-chart-shell">
              <canvas id="temperatureChart" aria-label="Hourly temperature chart" role="img"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="conditionModal" tabindex="-1" aria-labelledby="conditionModalTitle" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content dashboard-modal">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="conditionModalTitle">Weather Conditions Timeline</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="timeline-list" id="conditionTimeline"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="rainModal" tabindex="-1" aria-labelledby="rainModalTitle" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content dashboard-modal">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="rainModalTitle">Rainfall and Storm Probability</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row g-4">
              <div class="col-12 col-lg-6">
                <canvas id="rainfallChart" height="160" aria-label="Hourly rainfall chart" role="img"></canvas>
              </div>
              <div class="col-12 col-lg-6">
                <canvas id="precipitationChart" height="160" aria-label="Precipitation probability chart" role="img"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="newsModal" tabindex="-1" aria-labelledby="newsModalTitle" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content dashboard-modal">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="newsModalTitle">Weather News and Alerts</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="news-list" id="newsList"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/themes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/weather.js') }}"></script>
  </body>
</html>
